# Fly.io: https://fly.io/docs/languages-and-frameworks/docker/
#
# 1. Install CLI: https://fly.io/docs/hands-on/install-flyctl/
# 2. fly auth login
# 3. From backend/: fly apps create ocusmart-distance-api   # pick a unique name
# 4. fly volumes create ocusmart_data --region iad --size 3   # GB; match primary_region
# 5. fly deploy
#
# One volume is mounted at /data; docker-entrypoint.sh links /app/dataset and /app/models
# into subfolders so both persist across restarts.

app = "ocusmart-distance-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "ocusmart_data"
  destination = "/data"
